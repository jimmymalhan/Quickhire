global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'quickhire-backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'backend'
          env: 'production'
    scrape_interval: 10s

  - job_name: 'quickhire-frontend'
    metrics_path: /metrics
    static_configs:
      - targets: ['frontend:80']
        labels:
          service: 'frontend'

  - job_name: 'quickhire-postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgres'

  - job_name: 'quickhire-redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'infrastructure'
