name: Deploy to Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://staging.quickhire.app
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

      - name: Set image tag
        id: image
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Deploy to staging namespace
        run: |
          export IMAGE_TAG=${{ steps.image.outputs.tag }}

          # Update backend deployment
          kubectl set image deployment/quickhire-backend \
            backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }} \
            -n quickhire-staging

          # Update frontend deployment
          kubectl set image deployment/quickhire-frontend \
            frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ steps.image.outputs.tag }} \
            -n quickhire-staging

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/quickhire-backend -n quickhire-staging --timeout=300s
          kubectl rollout status deployment/quickhire-frontend -n quickhire-staging --timeout=300s

      - name: Run smoke tests
        run: |
          STAGING_URL=$(kubectl get svc quickhire-backend -n quickhire-staging -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          # Health check
          echo "Checking backend health..."
          curl -sf "${STAGING_URL}/health" || exit 1

          # API check
          echo "Checking API root..."
          curl -sf "${STAGING_URL}/api" || true

          echo "Staging smoke tests passed"

      - name: Verify monitoring endpoints
        run: |
          STAGING_URL=$(kubectl get svc quickhire-backend -n quickhire-staging -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "Checking metrics endpoint..."
          curl -sf "${STAGING_URL}/metrics" || true
          echo "Monitoring verification complete"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'failure',
              description: 'Staging deployment failed',
              context: 'deploy/staging'
            });
