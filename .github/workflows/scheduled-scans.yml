name: Scheduled Security & Maintenance

on:
  schedule:
    - cron: '0 3 * * 1' # Weekly Monday 3 AM UTC
  workflow_dispatch:

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Check for outdated dependencies
        run: npm outdated || true

      - name: Run npm audit (backend)
        run: npm audit --audit-level=moderate

      - name: Run npm audit (frontend)
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=moderate
        continue-on-error: true

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image for scanning
        run: docker build -t quickhire-backend-scan:latest .

      - name: Run Trivy on backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'quickhire-backend-scan:latest'
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Build frontend image for scanning
        run: docker build -t quickhire-frontend-scan:latest -f Dockerfile.frontend .

      - name: Run Trivy on frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'quickhire-frontend-scan:latest'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload backend scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-backend.sarif'
          category: 'trivy-backend'

      - name: Upload frontend scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-frontend.sarif'
          category: 'trivy-frontend'
