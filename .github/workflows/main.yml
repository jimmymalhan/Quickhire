name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_ENV: test

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run test suite
        run: npm test -- --passWithNoTests --no-coverage
        env:
          NODE_ENV: test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run ESLint
        run: |
          RESULT=$(npm run lint 2>&1)
          ERROR_COUNT=$(echo "$RESULT" | grep -oP '(\d+) error' | grep -oP '\d+' || echo "0")
          echo "$RESULT"
          if [ "${ERROR_COUNT:-0}" -gt 0 ]; then
            echo "❌ $ERROR_COUNT lint errors found"
            exit 1
          fi
          echo "✅ Lint passed (0 errors)"

  # Auto-merge: when tests + lint pass on a PR, auto-approve and merge
  auto-merge:
    name: Auto-Merge (CI Green)
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Auto-approve PR
        uses: actions/github-script@v7
        with:
          script: |
            // Auto-approve the PR since CI passed
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: '✅ CI passed: all tests green, lint clean. Auto-approved by CI pipeline.'
            });
            console.log('✅ PR auto-approved');

      - name: Enable auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            // Merge the PR
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                merge_method: 'squash',
                commit_title: `${context.payload.pull_request.title} (#${context.issue.number})`,
              });
              console.log('✅ PR auto-merged');
            } catch (e) {
              console.log('⚠️ Could not auto-merge (may need manual merge):', e.message);
            }

  # Status gate — required check for branch protection
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: always()
    steps:
      - name: Check CI results
        run: |
          if [ "${{ needs.test.result }}" = "success" ] && [ "${{ needs.lint.result }}" = "success" ]; then
            echo "✅ All CI checks passed"
            exit 0
          else
            echo "❌ CI failed — test=${{ needs.test.result }} lint=${{ needs.lint.result }}"
            exit 1
          fi
