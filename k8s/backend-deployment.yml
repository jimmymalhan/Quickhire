apiVersion: apps/v1
kind: Deployment
metadata:
  name: quickhire-backend
  namespace: quickhire-production
  labels:
    app: quickhire
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: quickhire
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: quickhire
        component: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/quickhire/quickhire:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: quickhire-config
            - secretRef:
                name: quickhire-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: quickhire-backend
  namespace: quickhire-production
  labels:
    app: quickhire
    component: backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app: quickhire
    component: backend
