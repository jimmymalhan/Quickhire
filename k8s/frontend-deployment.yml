apiVersion: apps/v1
kind: Deployment
metadata:
  name: quickhire-frontend
  namespace: quickhire-production
  labels:
    app: quickhire
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quickhire
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: quickhire
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/quickhire/quickhire-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
      restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: quickhire-frontend
  namespace: quickhire-production
  labels:
    app: quickhire
    component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: quickhire
    component: frontend
