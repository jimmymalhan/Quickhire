apiVersion: apps/v1
kind: Deployment
metadata:
  name: quickhire-redis
  namespace: quickhire-production
  labels:
    app: quickhire
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quickhire
      component: redis
  template:
    metadata:
      labels:
        app: quickhire
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 384Mi
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: redis-data
              mountPath: /data
      volumes:
        - name: redis-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: quickhire-redis
  namespace: quickhire-production
  labels:
    app: quickhire
    component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app: quickhire
    component: redis
