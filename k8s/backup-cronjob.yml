apiVersion: batch/v1
kind: CronJob
metadata:
  name: quickhire-db-backup
  namespace: quickhire-production
  labels:
    app: quickhire
    component: backup
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          containers:
            - name: backup
              image: postgres:14-alpine
              command:
                - /bin/sh
                - -c
                - |
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/backups/quickhire_${TIMESTAMP}.sql.gz"
                  pg_dump -h $DB_HOST -U $DB_USER -d $DB_NAME --format=custom --compress=9 | gzip > "$BACKUP_FILE"
                  echo "Backup created: $BACKUP_FILE ($(du -h $BACKUP_FILE | cut -f1))"
                  # Cleanup backups older than 30 days
                  find /backups -name "*.sql.gz" -mtime +30 -delete
              env:
                - name: DB_HOST
                  value: quickhire-postgres
                - name: DB_NAME
                  value: quickhire
                - name: DB_USER
                  value: postgres
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: quickhire-secrets
                      key: DB_PASSWORD
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: backup-pvc
          restartPolicy: OnFailure
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-pvc
  namespace: quickhire-production
  labels:
    app: quickhire
    component: backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
