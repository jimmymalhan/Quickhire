apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: quickhire-ingress
  namespace: quickhire-production
  labels:
    app: quickhire
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - quickhire.ai
        - api.quickhire.ai
      secretName: quickhire-tls
  rules:
    - host: quickhire.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quickhire-frontend
                port:
                  number: 80
    - host: api.quickhire.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: quickhire-backend
                port:
                  number: 8000
